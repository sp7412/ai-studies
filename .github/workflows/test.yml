name: Test Notebook

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install all dependencies
        run: |
          pip install --break-system-packages -q \
            torch torchvision \
            timm>=1.0.20 \
            scipy \
            numpy \
            pillow \
            tqdm \
            matplotlib \
            opencv-python-headless \
            packaging

      - name: System info
        run: |
          python3 --version
          python3 - <<'PYEOF'
import torch
print("torch:", torch.__version__)
print("CUDA:", torch.cuda.is_available())
if torch.cuda.is_available():
    print("GPU:", torch.cuda.get_device_name(0))
    print("VRAM:", round(torch.cuda.get_device_properties(0).total_memory/1e9, 1), "GB")
else:
    print("GPU: none (CPU only)")
PYEOF

      - name: Run tests (synthetic only)
        run: python3 test_notebook.py 2>&1 | tee ci_results_synthetic.txt

      - name: Run tests + DINOv2 backbone
        run: python3 test_notebook.py --dinov2 2>&1 | tee ci_results_dinov2.txt

      - name: Commit test results
        if: always()
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git pull origin main --rebase -q
          git add ci_results_synthetic.txt ci_results_dinov2.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "ci: test results [skip ci]"
          git push origin main
