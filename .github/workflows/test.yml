name: Test Notebook

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: write        # allows the runner to push results back to the repo

env:
  VENV: /home/seth/venv

jobs:
  test:
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Run tests (synthetic only)
        continue-on-error: true
        run: |
          echo "=== RUN STARTED $(date) ===" > ci_results_synthetic.txt
          source $VENV/bin/activate 2>&1 >> ci_results_synthetic.txt || echo "VENV ACTIVATE FAILED" >> ci_results_synthetic.txt
          python3 test_notebook.py >> ci_results_synthetic.txt 2>&1
          echo "=== EXIT CODE: $? ===" >> ci_results_synthetic.txt

      - name: Run tests + DINOv2 backbone
        continue-on-error: true
        run: |
          echo "=== RUN STARTED $(date) ===" > ci_results_dinov2.txt
          source $VENV/bin/activate 2>&1 >> ci_results_dinov2.txt || echo "VENV ACTIVATE FAILED" >> ci_results_dinov2.txt
          python3 test_notebook.py --dinov2 >> ci_results_dinov2.txt 2>&1
          echo "=== EXIT CODE: $? ===" >> ci_results_dinov2.txt

      - name: Commit test results
        if: always()
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git pull origin main --rebase -q
          git add -f ci_results_synthetic.txt ci_results_dinov2.txt
          git commit -m "ci: test results [skip ci]" || echo "nothing to commit"
          git push origin main
