name: Test Notebook

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  VENV: /home/seth/venv

jobs:
  test:
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: System info
        run: |
          source $VENV/bin/activate
          python3 --version
          python3 -c "
import torch
print('torch:', torch.__version__)
print('CUDA: ', torch.cuda.is_available())
if torch.cuda.is_available():
    print('GPU: ', torch.cuda.get_device_name(0))
    print('VRAM:', round(torch.cuda.get_device_properties(0).total_memory/1e9, 1), 'GB')
else:
    print('WARNING: CUDA not available, tests will run on CPU')
"

      - name: Run tests (synthetic only)
        # continue-on-error so the commit step always runs even if tests fail
        continue-on-error: true
        run: |
          source $VENV/bin/activate
          python3 test_notebook.py 2>&1 | tee ci_results_synthetic.txt
          echo "Exit code: ${PIPESTATUS[0]}" >> ci_results_synthetic.txt

      - name: Run tests + DINOv2 backbone
        continue-on-error: true
        run: |
          source $VENV/bin/activate
          python3 test_notebook.py --dinov2 2>&1 | tee ci_results_dinov2.txt
          echo "Exit code: ${PIPESTATUS[0]}" >> ci_results_dinov2.txt

      - name: Commit test results
        if: always()
        run: |
          # Ensure files exist even if steps were skipped
          touch ci_results_synthetic.txt ci_results_dinov2.txt
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git pull origin main --rebase -q
          git add ci_results_synthetic.txt ci_results_dinov2.txt
          git diff --cached --quiet || git commit -m "ci: test results [skip ci]"
          git push origin main
