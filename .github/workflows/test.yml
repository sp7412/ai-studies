name: Test Notebook

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== PyTorch / CUDA ==="
          python3 -c "
import torch
print('torch     :', torch.__version__)
print('CUDA avail:', torch.cuda.is_available())
if torch.cuda.is_available():
    print('GPU       :', torch.cuda.get_device_name(0))
    print('VRAM      :', round(torch.cuda.get_device_properties(0).total_memory/1e9,1), 'GB')
"
          echo "=== Disk ==="
          df -h /

      - name: Install dependencies
        run: |
          pip install scipy timm --break-system-packages -q --no-cache-dir

      - name: Verify imports
        run: |
          python3 -c "import torch, scipy, numpy, PIL, timm; print('All imports OK')"

      - name: Run tests — synthetic data (no downloads)
        run: python3 test_notebook.py

      - name: Run tests — DINOv2 backbone (downloads ~80 MB, cached after first run)
        run: python3 test_notebook.py --dinov2
